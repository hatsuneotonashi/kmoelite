name: Source CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CI: "true"

jobs:
  source-checks:
    name: Source checks
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --dir apps/kmoe-app typecheck
      - name: Vitest
        run: pnpm --dir apps/kmoe-app test:run
      - name: Build web assets
        run: pnpm --dir apps/kmoe-app build
      - name: Rust format
        run: cargo fmt --all --manifest-path apps/kmoe-app/src-tauri/Cargo.toml -- --check
      - name: Rust check
        run: cargo check --manifest-path apps/kmoe-app/src-tauri/Cargo.toml
      - name: Rust lib tests
        run: cargo test --manifest-path apps/kmoe-app/src-tauri/Cargo.toml --lib
      - name: Platform readiness
        run: pnpm check:platforms
      - name: iOS asset check
        run: node scripts/check-ios-assets.mjs

  windows-source-check:
    name: Windows source check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Frontend checks
        shell: pwsh
        run: |
          pnpm --dir apps/kmoe-app typecheck
          pnpm --dir apps/kmoe-app test:run
          pnpm --dir apps/kmoe-app build
      - name: Rust checks
        shell: pwsh
        run: |
          cargo fmt --all --manifest-path apps/kmoe-app/src-tauri/Cargo.toml -- --check
          cargo check --manifest-path apps/kmoe-app/src-tauri/Cargo.toml
          cargo test --manifest-path apps/kmoe-app/src-tauri/Cargo.toml --lib
